# PKO Website - Nginx Configuration
# Place in /etc/nginx/sites-available/pko and symlink to sites-enabled
#
# sudo ln -s /etc/nginx/sites-available/pko /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones - define before server block
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;
    
    root /var/www/pko/website;
    index index.php index.html;
    
    # Connection limits
    limit_conn addr 20;
    
    # General rate limiting
    limit_req zone=general burst=20 nodelay;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Block bad bots and scanners
    if ($http_user_agent ~* (havij|sqlmap|nikto|nessus|nmap|python-requests|curl\/|wget\/|masscan|zgrab)) {
        return 403;
    }
    
    # Block empty user agents
    if ($http_user_agent = "") {
        return 403;
    }
    
    # Block suspicious request methods
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 444;
    }
    
    # Block access to sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }
    
    # Block access to includes directory
    location ^~ /includes/ {
        deny all;
        return 404;
    }
    
    # Block backup and config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|yml|yaml)$ {
        deny all;
        return 404;
    }
    
    # API rate limiting - stricter for auth endpoints
    location ~ ^/api/auth/ {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
    
    # General API rate limiting
    location ^~ /api/ {
        limit_req zone=api burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
    
    # Static assets - cache aggressively
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # PHP handling
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # PHP security
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
    }
    
    # Default location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Error pages
    error_page 404 /404.php;
    error_page 500 502 503 504 /500.php;
    
    # Logging
    access_log /var/log/nginx/pko_access.log;
    error_log /var/log/nginx/pko_error.log;
}

