<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b2c6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="15" fill="url(#bg)"/>
  <!-- Magic seal/pentagram -->
  <circle cx="75" cy="35" r="15" fill="none" stroke="#E0B0FF" stroke-width="2"/>
  <polygon points="75,22 79,40 63,28 87,28 71,40" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Magic sparkles -->
  <circle cx="65" cy="25" r="2" fill="#FFD700"/>
  <circle cx="85" cy="30" r="1.5" fill="#E0B0FF"/>
  <circle cx="70" cy="50" r="1.5" fill="#FFD700"/>
  <!-- Character in mystic robes -->
  <circle cx="38" cy="42" r="14" fill="#f5d0a9" stroke="#d4a574" stroke-width="2"/>
  <ellipse cx="38" cy="72" rx="20" ry="17" fill="#4B0082" stroke="#2E0854" stroke-width="2"/>
  <circle cx="34" cy="40" r="2" fill="#333"/>
  <circle cx="42" cy="40" r="2" fill="#333"/>
  <path d="M34 47 Q38 50 42 47" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Wizard hat -->
  <polygon points="38,18 25,35 51,35" fill="#4B0082" stroke="#2E0854" stroke-width="1"/>
  <text x="50" y="95" text-anchor="middle" font-family="Arial" font-size="7" fill="white" font-weight="bold">SEAL MASTER</text>
</svg>
