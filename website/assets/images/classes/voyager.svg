<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e6251;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="15" fill="url(#bg)"/>
  <!-- Ship wheel -->
  <circle cx="75" cy="35" r="12" fill="none" stroke="#8B4513" stroke-width="3"/>
  <circle cx="75" cy="35" r="4" fill="#8B4513"/>
  <line x1="75" y1="23" x2="75" y2="47" stroke="#8B4513" stroke-width="2"/>
  <line x1="63" y1="35" x2="87" y2="35" stroke="#8B4513" stroke-width="2"/>
  <line x1="67" y1="27" x2="83" y2="43" stroke="#8B4513" stroke-width="2"/>
  <line x1="83" y1="27" x2="67" y2="43" stroke="#8B4513" stroke-width="2"/>
  <!-- Character -->
  <circle cx="38" cy="42" r="14" fill="#f5d0a9" stroke="#d4a574" stroke-width="2"/>
  <ellipse cx="38" cy="72" rx="20" ry="17" fill="#006994" stroke="#003366" stroke-width="2"/>
  <circle cx="34" cy="40" r="2" fill="#333"/>
  <circle cx="42" cy="40" r="2" fill="#333"/>
  <path d="M34 47 Q38 50 42 47" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Captain hat -->
  <ellipse cx="38" cy="30" rx="15" ry="4" fill="#000080"/>
