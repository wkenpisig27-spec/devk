# DXVK configuration for PKO client (Game.exe)
# Placed next to d3d9.dll in client/system/ — DXVK reads from the DLL's directory.
# Reference: https://github.com/doitsujin/dxvk/blob/master/dxvk.conf
#
# This client ships a DXVK 2.x build. Several legacy options have been removed
# upstream and silently ignored if set. Only options confirmed present in the
# current d3d9.dll are kept here. Removed: forceSwapchainMSAA, allowDoNotWait,
# useEarlyDiscard, evictManagedOnUnlock, enableStateCache, numBackBuffers,
# dxvk.maxFrameLatency.

# =============================================================================
# HUD (set blank to disable: dxvk.hud = )
# =============================================================================
dxvk.hud = fps,version,api,memory,gpuload

# =============================================================================
# Frame pacing & latency
# =============================================================================

# Lowest input latency. Default 2–3; 1 = snappiest feel.
d3d9.maxFrameLatency = 1

# Adaptive tear-free (FIFO_RELAXED). Auto picks best mode for your GPU.
dxvk.tearFree = Auto

# 0 = use all CPU cores for async shader compilation (reduces stutter).
dxvk.numCompilerThreads = 0

# =============================================================================
# Visual quality
# =============================================================================

# 16x anisotropic filtering — sharp textures at oblique angles, near-zero cost.
d3d9.samplerAnisotropy = 16

# Negative LOD bias sharpens distant textures (combines well with AF=16).
# Range: -1.0 (sharp/aliased) to +1.0 (softer). -0.5 is the safe sweet spot.
d3d9.samplerLodBias = -0.5

# Optimise repeated sampler patterns — reduces first-load shader stutter.
d3d9.forceSamplerTypeSpecConstants = True

# NOTE: forceSwapchainMSAA was removed in DXVK 2.x. Forcing MSAA now requires
# the engine to set present_param.MultiSampleType in MPRender::Init.
# See follow-up suggestion below.

# =============================================================================
# Performance
# =============================================================================

# Cached path for dynamic VB/IB. PKO's particles, UI, and debug primitives
# hammer Lock(DISCARD)/Unlock per draw — caching the staging buffers cuts
# CPU overhead in effect-heavy scenes.
d3d9.cachedDynamicBuffers = True

# Place small constant buffers in device-local (GPU) memory. Faster constant
# uploads for the per-character bone-palette path.
d3d9.deviceLocalConstantBuffers = True

# Direct CPU→GPU buffer mapping — faster uploads, safe for this engine.
d3d9.allowDirectBufferMapping = True

# Defer render-target creation — reduces stalls during map loads.
d3d9.deferSurfaceCreation = True

# Use D32 instead of D24X8 for 24-bit depth requests. Modern GPUs handle D32
# at the same speed and the extra precision kills minor terrain z-fighting.
d3d9.useD32forD24 = True

# Invariant position — prevents Z-fighting in multi-pass rendering (outline pass).
d3d9.invariantPosition = True

# Raw SSBO constant buffer path — faster uploads on Vulkan.
dxvk.useRawSsbo = True

# Background memory defragmentation — keeps VRAM tidy during long sessions.
dxvk.enableMemoryDefrag = True

# Memory caps for multi-client friendliness. Engine + DXVK currently reserve
# ~720 MB of Private Data per process but only resident-use ~320 MB — tightening
# the cap forces eviction sooner, dropping per-client RSS without affecting
# the active texture set.
#
# 768 MB Vulkan budget is comfortable headroom over typical observed peak.
dxvk.maxMemoryBudget = 768

# Tell the engine its texture pool is 256 MB so it self-budgets via the standard
# D3D9 caps query. PKO's resource manager respects this for managed-pool sizing.
d3d9.textureMemory = 256

# Cap the engine's reported VRAM. Old engines allocate more aggressively when
# they see GBs of headroom. 1 GB is a reasonable ceiling for this title.
d3d9.maxAvailableMemory = 1024

# =============================================================================
# Pipeline cache (Tier 2 — modern replacement)
# =============================================================================
# DXVK 2.x replaced the explicit .dxvk-cache file with two transparent
# mechanisms that need no setup:
#
#   1. Vulkan VkPipelineCache — the GPU driver (NVIDIA / AMD / Intel) persists
#      compiled pipelines automatically in its own per-vendor cache directory.
#      e.g. NVIDIA writes %LOCALAPPDATA%\NVIDIA\DXCache\.
#
#   2. Graphics Pipeline Library (GPL) — pipelines are linked from pre-compiled
#      shader stages on demand at near-zero cost. Replaces the old "build
#      monolithic pipelines on first hit" stutter pattern.
#
# Both run automatically. There is no Game.dxvk-cache file to ship.
dxvk.enableGraphicsPipelineLibrary = Auto

# =============================================================================
# Capability overrides
# =============================================================================

# Advertise vs_3_0 / ps_3_0 caps to the engine. PKO only uses vs_2_x and only
# checks `< 1.1` minimums (verified in MPRender / MPResManger), so this is
# free today. Lets us migrate to ps_3_0 later (ramp lookups, bloom-bright pass)
# without changing the runtime.
d3d9.shaderModel = 3

# =============================================================================
# Optional overrides (uncomment to enable)
# =============================================================================

# Force-disable VSync (uncapped FPS, use with a high-refresh monitor).
# d3d9.presentInterval = 0

# Force-enable VSync.
# d3d9.presentInterval = 1

# Built-in framerate cap (DXVK-side, replaces external limiters).
# d3d9.maxFrameRate = 144

# Strict float emulation — enable if UI or text rendering shows artifacts.
# d3d9.floatEmulation = Strict

# Cap reported VRAM. Useful only if the engine misbehaves on >2GB GPUs.
# d3d9.maxAvailableMemory = 2048
