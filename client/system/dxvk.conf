# DXVK configuration for Game.exe
# Reference: https://github.com/doitsujin/dxvk/blob/master/dxvk.conf
#
# This file is read by d3d9.dll (DXVK) on startup.
# Place next to the executable. Comment out lines to use DXVK defaults.

# =============================================================================
# D3D9-specific tuning
# =============================================================================

# Lower input latency. Default 3 = smoother but laggier; 1 = snappiest input.
# This is the single biggest win for "feel" in old games.
d3d9.maxFrameLatency = 1

# Triple-buffered swap chain.
d3d9.numBackBuffers = 3

# Defer surface (render-target) creation until needed.
# Reduces stalls and VRAM pressure during map loads.
d3d9.deferSurfaceCreation = True

# Force 16x anisotropic filtering on all samplers. Near-zero perf cost on
# any modern GPU; massively sharpens textures viewed at oblique angles
# (terrain, walls, distant geometry). Safe override.
d3d9.samplerAnisotropy = 16

# Enables a shader compilation optimization for repeated sampler patterns.
# Helps reduce stutter on first-time effect/shader loads.
d3d9.forceSamplerTypeSpecConstants = True

# =============================================================================
# General DXVK tuning
# =============================================================================

# Use raw shader storage buffers — faster constant buffer path on modern HW.
dxvk.useRawSsbo = True

# Auto-detect compiler thread count (0 = all available cores).
dxvk.numCompilerThreads = 0

# =============================================================================
# Optional overrides (uncomment to enable)
# =============================================================================

# Force-disable VSync regardless of in-game setting.
# Use only if you have a high-refresh monitor and want guaranteed uncapped FPS.
# d3d9.presentInterval = 0

# Force-enable VSync regardless of in-game setting.
# d3d9.presentInterval = 1

# Cap framerate (DXVK-side). Useful if engine FPS limiter misbehaves.
# Set to 0 for no cap.
# dxvk.maxFrameRate = 144

# Allocate device-local memory more aggressively. May help VRAM-constrained GPUs.
# dxvk.maxDeviceMemory = 0

# Limit memory chunk size (MB). Lower if you see allocation stalls on map loads.
# dxvk.maxChunkSize = 256
