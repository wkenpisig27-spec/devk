# DXVK configuration for Slime Pirates / PKO client
# Read from working directory of Game.exe (= client/ when launched via start.bat)
# Reference: https://github.com/doitsujin/dxvk/blob/master/dxvk.conf

# HUD: fps, version, api, devinfo, memory, frametimes, gpuload (or "full")
# Production: leave value blank -> dxvk.hud =
dxvk.hud = fps,version,api,memory,gpuload

# Frame pacing & latency
dxvk.maxFrameLatency           = 1
d3d9.maxFrameLatency           = 1
dxvk.tearFree                  = Auto
dxvk.numCompilerThreads        = 0
dxvk.enableAsync               = True

# Visual quality (free upgrades, no engine changes)
d3d9.samplerAnisotropy         = 16
d3d9.forceSwapchainMSAA        = 8

# Memory management for older DX9 engines
d3d9.evictManagedOnUnlock      = True
d3d9.allowDirectBufferMapping  = True

# Compatibility safety nets
d3d9.deferSurfaceCreation      = True
d3d9.invariantPosition         = True

# Optional - uncomment if specific issues appear
# d3d9.floatEmulation = Strict      # if UI/text artifacts
# d3d9.allowDoNotWait = True        # if black screen on map load
