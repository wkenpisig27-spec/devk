[Main]
Name = GateServer
Version = 32144

[Res]
log_dir = LOG\\GateServer

[GroupServer]
; Local GroupServer connection
IP = 127.0.0.1
Port = 1975
EnablePing = 180

[ToClient]
; Listen for client connections on all interfaces
IP = 0.0.0.0
Port = 1973
CommEncrypt = 1
EnablePing = 180
MaxConnection = 1000
WpeVersion = 0xE44CF
CheckSpan = 2
CheckWaring = 20
CheckError = 40

[ToGameServer]
; Local GameServer connection
IP = 127.0.0.1
Port = 1971
EnablePing = 180

[ShowRange]
ShowMin = 500
ShowMax = 800
IsUse = 1

[Chaos]
Map = PKmap
IsActive = 1

[AntiDDoS]
; =============================================================================
; MINIMAL CONFIG: All network-layer protection moved to SmartProxy
; GateServer only parses Proxy Protocol to extract real client IPs
; =============================================================================

; Disabled - SmartProxy handles all DDoS protection
Enabled = 0

; CRITICAL: Parse real client IP from SmartProxy's PROXY PROTOCOL v1 header
; SmartProxy sends: "PROXY TCP4 <real-ip> <dst-ip> <src-port> <dst-port>\r\n"
; This MUST be enabled when using SmartProxy
ProxyProtocol = 0

; OPTIONAL: For direct testing without SmartProxy (local development only)
; Enable this to whitelist IPs when testing without SmartProxy
WhitelistEnabled = 0
Whitelist = 127.0.0.1
