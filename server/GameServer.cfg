[Performance]
; fast_map_switch: Optimized map switching for single GameServer mode
; When enabled (1): Skips Gate routing and DB reload during map switch
; When disabled (0): Uses legacy multi-GameServer routing through Gate
; Benefits: Faster teleports, reduced DB load, lower latency
; Safety: Still saves to DB before switching for crash protection
fast_map_switch = 1


