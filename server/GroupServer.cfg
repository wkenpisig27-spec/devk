; Comma-separated list of allowed IP addresses
; Include your AccountServer, GateServer, and GameServer IPs here
; 127.0.0.1 is always allowed for local connections
; Example: AllowedIPs = 127.0.0.1,51.75.251.180,192.168.1.100
