; AccountServer Configuration File
[Res]
; Log directory (optional - leave empty for default)
log_dir = LOG\\AccountServer

[net]
listen_ip = 0.0.0.0
listen_port = 1978

[db]
dbserver = (local)\SQLExpress
db = AccountServer
userid = pko_account
passwd = Y87dc#$98

[gs]
; Group server passwords (groupname = password)
GroupServerAndor  = GroupServerAndor 
GroupServerAndor1 = GroupServerAndor1
GroupServerAndor2 = GroupServerAndor2 
GroupServerAndor5 = GroupServerAndor5 
GroupServerAndor6 = GroupServerAndor6 	
enable_ping = 1  

; ============================================
; Rate Limiting Configuration (Anti-Bruteforce)
; ============================================
[ratelimit]
; Enable/disable rate limiting (1=on, 0=off)
enabled = 1
; Max login attempts before blocking
max_attempts = 5
; Time window for counting attempts (in seconds, 120 = 2 minutes)
interval_seconds = 120
; How long to block after exceeding limit (in seconds)
block_seconds = 120

; ============================================
; Authentication Timeout Settings
; ============================================
[auth]
; Timeout for login operations (in milliseconds, 30000 = 30 seconds)
login_timeout_ms = 30000
; Wait time before allowing re-login from SAVING state (in seconds)
saving_protection_seconds = 15
; Delay for re-login attempts (in seconds)
relogin_delay_seconds = 15
